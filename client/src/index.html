    <style>
        /* DaemonDoc-inspired design tokens */
        :root {
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
        }
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body {
            background: #ffffff;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex; align-items: center; justify-content: center;
        }
        /* Hero SVG grid */
        .hero-grid-bg {
            -webkit-mask-image: radial-gradient(100% 100% at 50% 0%, white, transparent);
            mask-image: radial-gradient(100% 100% at 50% 0%, white, transparent);
            opacity: 0.15;
        }
        /* Feature card gradients (identical to DaemonDoc) */
        .feature-gradient-1 { background: radial-gradient(circle at top right, rgba(29,78,216,0.07) 0%, transparent 60%); }
        .feature-gradient-2 { background: radial-gradient(circle at top left, rgba(56,189,248,0.08) 0%, transparent 60%); }
        .feature-gradient-3 { background: radial-gradient(circle at bottom right, rgba(16,185,129,0.08) 0%, transparent 60%); }
        /* Float animations */
        @keyframes float-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes float-slow-d { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:0.5} }
        @keyframes dash-flow { to { stroke-dashoffset: -20; } }
        .animate-float { animation: float-slow 12s ease-in-out infinite; }
        .animate-float-d { animation: float-slow 12s ease-in-out 6s infinite; }
        .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
        .animate-dash { animation: dash-flow 3s linear infinite; }
        /* Scroll reveal */
        .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1), transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("active");
                    }
                });
            }, { threshold: 0.05 });
            
            const checkReveal = () => {
                document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
            };
            
            checkReveal();
            
            // Re-check periodically or on DOM changes for SPA page routing
            const observerMutation = new MutationObserver(checkReveal);
            observerMutation.observe(document.body, { childList: true, subtree: true });
        });
    </script>
</head>
<body class="text-on-surface bg-background min-h-screen">
